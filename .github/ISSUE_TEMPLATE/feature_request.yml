name: Feature request
description: Suggest a useful improvement for Resume Studio.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for sharing an idea.

        Please do not include private resume content, personal contact information, or sensitive job-search details in a public issue. If the request needs private context, email labs@bractos.com instead.
  - type: textarea
    id: problem
    attributes:
      label: What problem would this solve?
      placeholder: Describe the workflow, frustration, or missing capability.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: What would you like to see?
      placeholder: Describe the feature or change you have in mind.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Any alternatives?
      placeholder: Share workarounds or simpler versions that would still help.
    validations:
      required: false
  - type: dropdown
    id: area
    attributes:
      label: Product area
      options:
        - Resume editor
        - Guided editing
        - Resume review
        - Job tailoring
        - Export
        - Import
        - Dashboard
        - Privacy or storage
        - Other
    validations:
      required: false
