name: Feature request
description: Suggest a useful improvement for Resume Studio.
title: "[Feature]: "
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for sharing an idea.

        Do not include private resume content, personal contact information, job application details, or other sensitive data in a public issue. If the request needs private context, email labs@bractos.com instead.
  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      placeholder: What workflow, frustration, or missing capability should this address?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      placeholder: What would you like Resume Studio to do?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      placeholder: Are there simpler options or workarounds that would still help?
    validations:
      required: false
  - type: textarea
    id: beneficiaries
    attributes:
      label: Who would benefit?
      placeholder: Describe the type of user or workflow this helps.
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Additional context
      placeholder: Add any other non-sensitive context.
    validations:
      required: false
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy confirmation
      options:
        - label: I confirm I have not included private resume content, personal contact information, job application details, or other sensitive data.
          required: true
