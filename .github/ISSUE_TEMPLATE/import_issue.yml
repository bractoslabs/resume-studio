name: Import issue
description: Report problems importing an existing resume.
title: "[Import]: "
labels: ["bug", "import"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting an import issue.

        Please do not attach resumes with private details. Redact names, contact details, employers, and sensitive job-search information before posting. If you need to share private details, email labs@bractos.com instead.
  - type: dropdown
    id: source-format
    attributes:
      label: Import source
      options:
        - Pasted text
        - Markdown
        - TXT
        - PDF
        - DOCX
        - JSON Resume
        - YAML
        - Resume Studio JSON
        - Other
    validations:
      required: true
  - type: textarea
    id: issue
    attributes:
      label: What went wrong?
      placeholder: Describe what was missing, parsed incorrectly, or confusing in the import review.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
      placeholder: Describe how the resume should have imported.
    validations:
      required: true
  - type: textarea
    id: redacted-example
    attributes:
      label: Redacted sample
      description: Add the smallest redacted sample that shows the problem, if you can.
      placeholder: Remove names, contact details, employers, and sensitive content before posting.
    validations:
      required: false
  - type: dropdown
    id: browser
    attributes:
      label: Browser
      options:
        - Chrome
        - Edge
        - Firefox
        - Safari
        - Other
    validations:
      required: false
