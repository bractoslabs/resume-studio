name: Import issue
description: Report problems importing an existing resume.
title: "[Import]: "
labels: ["bug", "import", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting an import issue.

        Do not attach resumes with private details. Redact names, contact details, employers, and sensitive job-search information before posting. If you need to share private details, email labs@bractos.com instead.
  - type: dropdown
    id: import-type
    attributes:
      label: Import type
      options:
        - DOCX
        - PDF
        - Markdown
        - TXT
        - JSON
        - YAML
        - Other
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: Browser and version
      placeholder: Chrome 126, Safari 17, Firefox 128, Edge 126
    validations:
      required: false
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: macOS, Windows, Linux, iOS, Android
    validations:
      required: false
  - type: dropdown
    id: pdf-text
    attributes:
      label: If PDF, is the file scanned/image-based or selectable text?
      options:
        - Selectable text
        - Scanned or image-based
        - Not sure
        - Not applicable
    validations:
      required: false
  - type: textarea
    id: happened
    attributes:
      label: What happened?
      placeholder: Describe what was missing, parsed incorrectly, or confusing in the import review.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What you expected
      placeholder: Describe how the resume should have imported.
    validations:
      required: true
  - type: dropdown
    id: sample-file
    attributes:
      label: Does this happen with a sanitized/sample file?
      options:
        - "Yes"
        - "No"
        - I have not tested a sanitized/sample file
    validations:
      required: false
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy confirmation
      options:
        - label: I confirm I have not included private resume content, personal contact information, or sensitive job-search details.
          required: true
