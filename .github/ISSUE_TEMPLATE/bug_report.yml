name: Bug report
description: Report something broken or confusing in Resume Studio.
title: "[Bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve Resume Studio.

        Do not include private resume content, personal contact information, job application details, or other sensitive data in a public issue. If the report needs private details, email labs@bractos.com instead.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened?
      placeholder: Tell us what broke, looked wrong, or behaved unexpectedly.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to...
        2. Click...
        3. See...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      placeholder: What happened instead?
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: Browser and version
      placeholder: Chrome 126, Safari 17, Firefox 128, Edge 126
    validations:
      required: false
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: macOS, Windows, Linux, iOS, Android
    validations:
      required: false
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: Optional. Redact private content first.
    validations:
      required: false
  - type: input
    id: version
    attributes:
      label: Resume Studio version or deployment URL
      placeholder: v0.2.0-beta or https://resume.bractos.com/
    validations:
      required: false
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy confirmation
      options:
        - label: I confirm I have not included private resume content, personal contact information, job application details, or other sensitive data.
          required: true
