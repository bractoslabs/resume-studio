name: Export issue
description: Report problems with Print / Save as PDF, DOCX, Markdown, backup, or other export paths.
title: "[Export]: "
labels: ["bug", "export", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting an export issue.

        Do not attach resumes with private details. Redact names, contact details, employers, job application details, and other sensitive data before posting. If you need to share private details, email labs@bractos.com instead.
  - type: dropdown
    id: export-type
    attributes:
      label: Export type
      options:
        - Print / Save as PDF
        - DOCX
        - Markdown
        - Backup
        - Other
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: Browser and version
      placeholder: Chrome 126, Safari 17, Firefox 128, Edge 126
    validations:
      required: false
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: macOS, Windows, Linux, iOS, Android
    validations:
      required: false
  - type: dropdown
    id: page-size
    attributes:
      label: Page size, if PDF/print
      options:
        - Letter
        - A4
        - Other
        - Not applicable
    validations:
      required: false
  - type: textarea
    id: happened
    attributes:
      label: What happened?
      placeholder: Describe the layout, download, formatting, content, or print problem.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What you expected
      placeholder: Describe the output you expected.
    validations:
      required: true
  - type: textarea
    id: screenshot
    attributes:
      label: Screenshot
      description: Optional. Redact private content first.
    validations:
      required: false
  - type: dropdown
    id: sample-content
    attributes:
      label: Does this happen with sample resume content?
      options:
        - "Yes"
        - "No"
        - I have not tested sample content
    validations:
      required: false
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy confirmation
      options:
        - label: I confirm I have not included private resume content, personal contact information, job application details, or other sensitive data.
          required: true
