<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-labelledby="title desc">
  <title id="title">Resume Studio GitHub social preview</title>
  <desc id="desc">Resume Studio by Bractos Labs, a free private Markdown-first resume builder with live preview, review tools, keyword fit check, and PDF export.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fbfa"/>
      <stop offset=".54" stop-color="#edf5f2"/>
      <stop offset="1" stop-color="#ffffff"/>
    </linearGradient>
    <radialGradient id="glow" cx="90%" cy="8%" r="40%">
      <stop offset="0" stop-color="#436a6b" stop-opacity=".16"/>
      <stop offset="1" stop-color="#436a6b" stop-opacity="0"/>
    </radialGradient>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="170%">
      <feDropShadow dx="0" dy="30" stdDeviation="22" flood-color="#182725" flood-opacity=".18"/>
    </filter>
    <filter id="markShadow" x="-60%" y="-60%" width="220%" height="220%">
      <feDropShadow dx="0" dy="16" stdDeviation="14" flood-color="#436a6b" flood-opacity=".24"/>
    </filter>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>
  <rect width="1280" height="640" fill="url(#glow)"/>

  <g font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
    <g transform="translate(88 82)">
      <g transform="translate(0 0)">
        <g transform="translate(0 0)" fill="none">
          <rect width="48" height="48" rx="14" fill="#436a6b" filter="url(#markShadow)"/>
          <path d="M29 10H17a3 3 0 0 0-3 3v22a3 3 0 0 0 3 3h14a3 3 0 0 0 3-3V15z" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M29 10v7h7M19 25h10M19 31h10M19 19h2" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
        </g>
        <text x="62" y="32" fill="#263f40" font-size="25" font-weight="760">Bractos Labs</text>
      </g>

      <text x="0" y="158" fill="#13201e" font-size="84" font-weight="820" letter-spacing="0">Resume Studio</text>
      <text x="0" y="213" fill="#5f706d" font-size="29" font-weight="460">Free, private, Markdown-first resume builder.</text>
      <text x="0" y="250" fill="#5f706d" font-size="29" font-weight="460">No account required.</text>

      <g transform="translate(0 287)" font-size="16" font-weight="680" fill="#263f40" dominant-baseline="middle">
        <rect x="0" y="0" width="120" height="42" rx="21" fill="#fff" fill-opacity=".82" stroke="#436a6b" stroke-opacity=".22"/>
        <text x="60" y="22" text-anchor="middle">Live preview</text>
        <rect x="132" y="0" width="144" height="42" rx="21" fill="#fff" fill-opacity=".82" stroke="#436a6b" stroke-opacity=".22"/>
        <text x="204" y="22" text-anchor="middle">Resume Review</text>
        <rect x="288" y="0" width="178" height="42" rx="21" fill="#fff" fill-opacity=".82" stroke="#436a6b" stroke-opacity=".22"/>
        <text x="377" y="22" text-anchor="middle">Keyword &amp; Fit Check</text>
        <rect x="478" y="0" width="178" height="42" rx="21" fill="#fff" fill-opacity=".82" stroke="#436a6b" stroke-opacity=".22"/>
        <text x="567" y="22" text-anchor="middle">Print / Save as PDF</text>
      </g>
    </g>

    <g transform="translate(774 82)">
      <rect x="46" y="20" width="418" height="474" rx="22" fill="#436a6b" fill-opacity=".18"/>
      <g filter="url(#softShadow)">
        <rect x="0" y="0" width="418" height="474" rx="22" fill="#fff" stroke="#d7e2de"/>
        <g transform="translate(36 34)">
          <rect x="74" y="0" width="240" height="20" rx="4" fill="#14211f"/>
          <rect x="119" y="30" width="150" height="10" rx="5" fill="#436a6b"/>
          <rect x="59" y="49" width="270" height="8" rx="4" fill="#b5c7c2"/>
        </g>
        <g transform="translate(36 119)">
          <rect width="128" height="11" rx="5.5" fill="#263f40"/>
          <rect y="21" width="346" height="2" fill="#dce5e1"/>
          <rect y="35" width="332" height="8" rx="4" fill="#9aaca7"/>
          <rect y="52" width="284" height="8" rx="4" fill="#9aaca7"/>
          <rect y="69" width="214" height="8" rx="4" fill="#9aaca7"/>
        </g>
        <g transform="translate(36 222)">
          <rect width="128" height="11" rx="5.5" fill="#263f40"/>
          <rect y="21" width="346" height="2" fill="#dce5e1"/>
          <rect y="35" width="332" height="8" rx="4" fill="#9aaca7"/>
          <rect y="52" width="332" height="8" rx="4" fill="#9aaca7"/>
          <rect y="69" width="284" height="8" rx="4" fill="#9aaca7"/>
          <rect y="86" width="214" height="8" rx="4" fill="#9aaca7"/>
        </g>
        <g transform="translate(36 345)">
          <rect width="128" height="11" rx="5.5" fill="#263f40"/>
          <rect y="21" width="346" height="2" fill="#dce5e1"/>
          <rect y="35" width="284" height="8" rx="4" fill="#9aaca7"/>
          <rect y="52" width="332" height="8" rx="4" fill="#9aaca7"/>
          <rect y="69" width="214" height="8" rx="4" fill="#9aaca7"/>
        </g>
        <circle cx="350" cy="18" r="5" fill="#436a6b" fill-opacity=".7"/>
        <circle cx="350" cy="36" r="5" fill="#436a6b" fill-opacity=".7"/>
        <circle cx="350" cy="54" r="5" fill="#436a6b" fill-opacity=".7"/>
      </g>
    </g>

    <text x="88" y="604" fill="#6b7c78" font-size="18" font-weight="620">Open source public beta</text>
    <text x="823" y="604" fill="#263f40" font-size="18" font-weight="620">github.com/bractoslabs/resume-studio</text>
  </g>
</svg>
